apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: jpglabs
  labels:
    app: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      serviceAccountName: portfolio-sa
      containers:
        - name: portfolio
          image: portfolio:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXTAUTH_URL
              value: "https://jpglabs.com.br"
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: supabase-url
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: supabase-anon-key
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: nextauth-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio
  namespace: jpglabs
spec:
  selector:
    app: portfolio
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
