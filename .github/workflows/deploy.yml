name: Deploy Portfolio to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: code/portfolio/package-lock.json

      - name: Install dependencies
        run: |
          cd code/portfolio
          npm install

      - name: Build Next.js
        run: |
          cd code/portfolio
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OLLAMA_URL: ${{ secrets.OLLAMA_URL }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: code/portfolio
          push: true
          tags: ${{ secrets.DOCKER_IMAGE_NAME }}:latest
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      - name: Copy K8s Manifests to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "code/portfolio/k8s/*.yaml"
          target: "~/portfolio/k8s"
          strip_components: 2

      - name: Deploy to k3s
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            kubectl apply -f ~/portfolio/k8s/namespace.yaml
            kubectl apply -f ~/portfolio/k8s/
