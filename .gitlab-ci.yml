  before_script:
    - apt-get update -qq && apt-get install -y -qq openssh-client rsync > /dev/null 2>&1
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - rsync -avz --delete
        --exclude='node_modules'
        --exclude='.git'
        --exclude='.next'
        --exclude='.env'
        --exclude='.env.local'
        -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no"
        ./ ${VPS_USER}@${VPS_HOST}:${DEPLOY_DIR}-staging/
    - |
      ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST} "
        cd ${DEPLOY_DIR}-staging &&
        cat > .env.local << 'ENVEOF'
      NEXT_PUBLIC_SUPABASE_URL=${STG_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY=${STG_SUPABASE_ANON_KEY}
      OLLAMA_URL=${STG_OLLAMA_URL}
      NODE_ENV=production
      ENVEOF
        npm ci --prefer-offline &&
        npm run build &&
        (pm2 restart portfolio-frontend-staging 2>/dev/null || pm2 start npm --name portfolio-frontend-staging -- start -- -p 4002)
      "

# ===================
# DEPLOY PRODUCTION (manual, main only)
# ===================
deploy-production:
  stage: deploy
  image: debian:bookworm-slim
  environment:
    name: production
    url: http://$VPS_HOST:4000
  only:
    - main
  when: manual
  allow_failure: false
  before_script:
    - apt-get update -qq && apt-get install -y -qq openssh-client rsync > /dev/null 2>&1
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - rsync -avz --delete
        --exclude='node_modules'
        --exclude='.git'
        --exclude='.next'
        --exclude='.env'
        --exclude='.env.local'
        -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no"
        ./ ${VPS_USER}@${VPS_HOST}:${DEPLOY_DIR}/
    - |
      ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST} "
        cd ${DEPLOY_DIR} &&
        cat > .env.local << 'ENVEOF'
      NEXT_PUBLIC_SUPABASE_URL=${PROD_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY=${PROD_SUPABASE_ANON_KEY}
      OLLAMA_URL=${PROD_OLLAMA_URL}
      NODE_ENV=production
      ENVEOF
        npm ci --prefer-offline &&
        npm run build &&
        (pm2 restart portfolio-frontend 2>/dev/null || pm2 start npm --name portfolio-frontend -- start -- -p 4000)
      "
